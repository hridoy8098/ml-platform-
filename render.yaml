services:
  - type: web
    name: ml-platform
    env: python
    buildCommand: |
      cd frontend-react && npm install && npm run build
      cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
      - key: DEBUG
        value: false
      - key: MAX_UPLOAD_SIZE_MB
        value: 10
      - key: CORS_ORIGINS
        value: https://ml-platform.onrender.com
      - key: LOG_LEVEL
        value: WARNING
